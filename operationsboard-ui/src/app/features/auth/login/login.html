<div class="login-page">
  <form class="login-card" (ngSubmit)="login()">
    <h1>Operations Board</h1>
    <p>Sign in to continue</p>

    @if (errorMessage()) {
      <div class="error">
        {{ errorMessage() }}
      </div>
    }

    <label>
      Username
      <input
        name="username"
        [(ngModel)]="username"
        autocomplete="username"
        required
      />
    </label>

    <label>
      Password
      <input
        name="password"
        type="password"
        [(ngModel)]="password"
        autocomplete="current-password"
        required
      />
    </label>

    <button type="submit" [disabled]="loading()">
      {{ loading() ? 'Signing in...' : 'Sign In' }}
    </button>
  </form>
</div>
