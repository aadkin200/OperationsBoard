# =========================================
# Application
# =========================================

spring.application.name=operationsboard

# =========================================
# Server
# =========================================

server.port=8080

# =========================================
# MySQL Datasource
# =========================================

spring.datasource.url=jdbc:mysql://localhost:3306/operations_board?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=fe8b4f84
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================
# JPA / Hibernate
# =========================================

# Since we already created schema manually in MySQL Workbench
# do NOT let Hibernate try to create/update tables

spring.jpa.hibernate.ddl-auto=none

# Show SQL in console during development
spring.jpa.show-sql=true

# Pretty formatted SQL logs
spring.jpa.properties.hibernate.format_sql=true

# Better production practice
spring.jpa.open-in-view=false

# =========================================
# SQL Initialization
# =========================================

# Prevent Spring from auto-running schema.sql/data.sql
# since we're managing schema manually

spring.sql.init.mode=never

# =========================================
# Jackson
# =========================================

spring.jackson.time-zone=UTC

# =========================================
# Logging
# =========================================

logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
